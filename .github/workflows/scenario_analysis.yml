name: Scenario Analysis Overnight Run

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:

  axis1-demand:
    name: "Axis 1 - Demand Scaling"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 1
        run: python src/scenario_analysis.py --axis 1

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis1-results
          path: |
            src/outputs/scenario_analysis/results/axis_1.csv
            src/outputs/scenario_analysis/plots/axis_1*.png
          retention-days: 30

  axis2-operators:
    name: "Axis 2 - Operator Sweep"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 2
        run: python src/scenario_analysis.py --axis 2

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis2-results
          path: |
            src/outputs/scenario_analysis/results/axis_2.csv
            src/outputs/scenario_analysis/plots/axis_2*.png
          retention-days: 30

  axis3-alpha:
    name: "Axis 3 - Weight alpha"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 3 weight 0
        run: python src/scenario_analysis.py --axis 3 --weight-index 0

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis3-weight-0
          path: src/outputs/scenario_analysis/results/axis_3_weight_0.csv
          retention-days: 30

  axis3-beta:
    name: "Axis 3 - Weight beta"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 3 weight 1
        run: python src/scenario_analysis.py --axis 3 --weight-index 1

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis3-weight-1
          path: src/outputs/scenario_analysis/results/axis_3_weight_1.csv
          retention-days: 30

  axis3-gamma:
    name: "Axis 3 - Weight gamma"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 3 weight 2
        run: python src/scenario_analysis.py --axis 3 --weight-index 2

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis3-weight-2
          path: src/outputs/scenario_analysis/results/axis_3_weight_2.csv
          retention-days: 30

  axis3-delta:
    name: "Axis 3 - Weight delta"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 3 weight 3
        run: python src/scenario_analysis.py --axis 3 --weight-index 3

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis3-weight-3
          path: src/outputs/scenario_analysis/results/axis_3_weight_3.csv
          retention-days: 30

  axis3-epsilon:
    name: "Axis 3 - Weight epsilon"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 3 weight 4
        run: python src/scenario_analysis.py --axis 3 --weight-index 4

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis3-weight-4
          path: src/outputs/scenario_analysis/results/axis_3_weight_4.csv
          retention-days: 30

  collect-results:
    name: "Collect and Commit Results"
    runs-on: ubuntu-latest
    needs: [axis1-demand, axis2-operators, axis3-alpha, axis3-beta, axis3-gamma, axis3-delta, axis3-epsilon]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: src/outputs/scenario_analysis/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Merge axis3 weight CSVs and generate plots
        run: python src/scenario_analysis.py --axis 3 --merge-weights --plots-only

      - name: Commit results to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/outputs/scenario_analysis/
          git commit -m "scenario analysis results $(date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push
