name: Scenario Analysis Overnight Run

on:
  workflow_dispatch:
    inputs:
      planning_start:
        description: "Inicio do horizonte (YYYY-MM-DD; vazio = inicio do mes da procura)"
        required: false
        default: ""
      planning_end:
        description: "Fim do horizonte (YYYY-MM-DD; vazio = fim do mes da procura)"
        required: false
        default: ""
      operators:
        description: "Operadores disponiveis por dia"
        required: true
        default: "20"
      shifts:
        description: "Numero de turnos por dia"
        required: true
        type: choice
        options:
          - "1"
          - "2"
        default: "1"
      shift_start:
        description: "Inicio do turno (HH:MM)"
        required: true
        default: "08:00"
      shift_end:
        description: "Fim do turno (HH:MM)"
        required: true
        default: "16:30"
      non_working_dates:
        description: "Dias sem trabalho, separados por virgulas (YYYY-MM-DD)"
        required: false
        default: ""
  schedule:
    - cron: '0 22 * * *'

permissions:
  contents: write

env:
  PLANNING_START: ${{ inputs.planning_start || '' }}
  PLANNING_END: ${{ inputs.planning_end || '' }}
  OPERATORS: ${{ inputs.operators || '20' }}
  SHIFTS: ${{ inputs.shifts || '1' }}
  SHIFT_START: ${{ inputs.shift_start || '08:00' }}
  SHIFT_END: ${{ inputs.shift_end || '16:30' }}
  NON_WORKING_DATES: ${{ inputs.non_working_dates || '' }}

jobs:

  axis1-demand:
    name: "Axis 1 - Demand Scaling"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 1
        run: python src/scenario_analysis.py --axis 1 --excel-path Inputs_EmpresaXTest.xlsx --output-dir src/outputs/scenario_analysis_EmpresaXTest --planning-start "$PLANNING_START" --planning-end "$PLANNING_END" --operators "$OPERATORS" --shifts "$SHIFTS" --shift-start "$SHIFT_START" --shift-end "$SHIFT_END" --non-working-dates "$NON_WORKING_DATES"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis1-results
          path: |
            src/outputs/scenario_analysis_EmpresaXTest/results/axis_1.csv
            src/outputs/scenario_analysis_EmpresaXTest/plots/axis_1*.png
          retention-days: 30

  axis2-operators:
    name: "Axis 2 - Operator Sweep"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 2
        run: python src/scenario_analysis.py --axis 2 --excel-path Inputs_EmpresaXTest.xlsx --output-dir src/outputs/scenario_analysis_EmpresaXTest --planning-start "$PLANNING_START" --planning-end "$PLANNING_END" --operators "$OPERATORS" --shifts "$SHIFTS" --shift-start "$SHIFT_START" --shift-end "$SHIFT_END" --non-working-dates "$NON_WORKING_DATES"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis2-results
          path: |
            src/outputs/scenario_analysis_EmpresaXTest/results/axis_2.csv
            src/outputs/scenario_analysis_EmpresaXTest/plots/axis_2*.png
          retention-days: 30

  axis3-alpha:
    name: "Axis 3 - Weight alpha"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 3 weight 0
        run: python src/scenario_analysis.py --axis 3 --weight-index 0 --excel-path Inputs_EmpresaXTest.xlsx --output-dir src/outputs/scenario_analysis_EmpresaXTest --planning-start "$PLANNING_START" --planning-end "$PLANNING_END" --operators "$OPERATORS" --shifts "$SHIFTS" --shift-start "$SHIFT_START" --shift-end "$SHIFT_END" --non-working-dates "$NON_WORKING_DATES"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis3-weight-0
          path: src/outputs/scenario_analysis_EmpresaXTest/results/axis_3_weight_0.csv
          retention-days: 30

  axis3-beta:
    name: "Axis 3 - Weight beta"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 3 weight 1
        run: python src/scenario_analysis.py --axis 3 --weight-index 1 --excel-path Inputs_EmpresaXTest.xlsx --output-dir src/outputs/scenario_analysis_EmpresaXTest --planning-start "$PLANNING_START" --planning-end "$PLANNING_END" --operators "$OPERATORS" --shifts "$SHIFTS" --shift-start "$SHIFT_START" --shift-end "$SHIFT_END" --non-working-dates "$NON_WORKING_DATES"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis3-weight-1
          path: src/outputs/scenario_analysis_EmpresaXTest/results/axis_3_weight_1.csv
          retention-days: 30

  axis3-gamma:
    name: "Axis 3 - Weight gamma"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 3 weight 2
        run: python src/scenario_analysis.py --axis 3 --weight-index 2 --excel-path Inputs_EmpresaXTest.xlsx --output-dir src/outputs/scenario_analysis_EmpresaXTest --planning-start "$PLANNING_START" --planning-end "$PLANNING_END" --operators "$OPERATORS" --shifts "$SHIFTS" --shift-start "$SHIFT_START" --shift-end "$SHIFT_END" --non-working-dates "$NON_WORKING_DATES"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis3-weight-2
          path: src/outputs/scenario_analysis_EmpresaXTest/results/axis_3_weight_2.csv
          retention-days: 30

  axis3-delta:
    name: "Axis 3 - Weight delta"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 3 weight 3
        run: python src/scenario_analysis.py --axis 3 --weight-index 3 --excel-path Inputs_EmpresaXTest.xlsx --output-dir src/outputs/scenario_analysis_EmpresaXTest --planning-start "$PLANNING_START" --planning-end "$PLANNING_END" --operators "$OPERATORS" --shifts "$SHIFTS" --shift-start "$SHIFT_START" --shift-end "$SHIFT_END" --non-working-dates "$NON_WORKING_DATES"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis3-weight-3
          path: src/outputs/scenario_analysis_EmpresaXTest/results/axis_3_weight_3.csv
          retention-days: 30

  axis3-epsilon:
    name: "Axis 3 - Weight epsilon"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Axis 3 weight 4
        run: python src/scenario_analysis.py --axis 3 --weight-index 4 --excel-path Inputs_EmpresaXTest.xlsx --output-dir src/outputs/scenario_analysis_EmpresaXTest --planning-start "$PLANNING_START" --planning-end "$PLANNING_END" --operators "$OPERATORS" --shifts "$SHIFTS" --shift-start "$SHIFT_START" --shift-end "$SHIFT_END" --non-working-dates "$NON_WORKING_DATES"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: axis3-weight-4
          path: src/outputs/scenario_analysis_EmpresaXTest/results/axis_3_weight_4.csv
          retention-days: 30

  collect-results:
    name: "Collect Results"
    runs-on: ubuntu-latest
    needs: [axis1-demand, axis2-operators, axis3-alpha, axis3-beta, axis3-gamma, axis3-delta, axis3-epsilon]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: src/outputs/scenario_analysis_EmpresaXTest/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reorganize downloaded artifacts
        run: |
          mkdir -p src/outputs/scenario_analysis_EmpresaXTest/results
          for i in 0 1 2 3 4; do
            cp src/outputs/scenario_analysis_EmpresaXTest/axis3-weight-$i/axis_3_weight_$i.csv \
               src/outputs/scenario_analysis_EmpresaXTest/results/
          done

      - name: Merge axis3 weight CSVs and generate plots
        run: python src/scenario_analysis.py --axis 3 --merge-weights --plots-only --excel-path Inputs_EmpresaXTest.xlsx --output-dir src/outputs/scenario_analysis_EmpresaXTest --planning-start "$PLANNING_START" --planning-end "$PLANNING_END" --operators "$OPERATORS" --shifts "$SHIFTS" --shift-start "$SHIFT_START" --shift-end "$SHIFT_END" --non-working-dates "$NON_WORKING_DATES"

      - name: Upload final merged results
        uses: actions/upload-artifact@v4
        with:
          name: scenario-analysis-EmpresaXTest-final
          path: src/outputs/scenario_analysis_EmpresaXTest/
          retention-days: 30
