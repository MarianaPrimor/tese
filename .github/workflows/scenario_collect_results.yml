name: Collect Scenario Results

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "ID da execução Scenario Analysis que produziu os artifacts"
        required: true
      planning_start:
        description: "Início do horizonte (YYYY-MM-DD; vazio = início do mês da procura)"
        required: false
        default: ""
      planning_end:
        description: "Fim do horizonte (YYYY-MM-DD; vazio = fim do mês da procura)"
        required: false
        default: ""
      operators:
        description: "Operadores disponíveis por dia"
        required: true
        default: "18"
      shifts:
        description: "Número de turnos por dia"
        required: true
        type: choice
        options:
          - "1"
          - "2"
        default: "1"
      shift_start:
        description: "Início do turno (HH:MM)"
        required: true
        default: "08:00"
      shift_end:
        description: "Fim do turno (HH:MM)"
        required: true
        default: "16:30"
      non_working_dates:
        description: "Dias sem trabalho, separados por vírgulas (YYYY-MM-DD)"
        required: false
        default: ""

permissions:
  actions: read
  contents: read

jobs:
  collect-results:
    name: Collect existing scenario artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts from source run
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: src/outputs/scenario_analysis_v3/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reorganize downloaded artifacts
        run: |
          mkdir -p src/outputs/scenario_analysis_v3/results
          mkdir -p src/outputs/scenario_analysis_v3/plots
          find src/outputs/scenario_analysis_v3/axis1-results \
            -type f -name 'axis_1.csv' \
            -exec cp {} src/outputs/scenario_analysis_v3/results/ \;
          find src/outputs/scenario_analysis_v3/axis2-results \
            -type f -name 'axis_2.csv' \
            -exec cp {} src/outputs/scenario_analysis_v3/results/ \;
          find src/outputs/scenario_analysis_v3/axis1-results \
            -type f -name 'axis_1*.png' \
            -exec cp {} src/outputs/scenario_analysis_v3/plots/ \;
          find src/outputs/scenario_analysis_v3/axis2-results \
            -type f -name 'axis_2*.png' \
            -exec cp {} src/outputs/scenario_analysis_v3/plots/ \;
          for i in 0 1 2 3 4 5; do
            find src/outputs/scenario_analysis_v3/axis3-weight-$i \
              -type f -name "axis_3_weight_$i.csv" \
              -exec cp {} src/outputs/scenario_analysis_v3/results/ \;
          done
          test -f src/outputs/scenario_analysis_v3/results/axis_1.csv
          test -f src/outputs/scenario_analysis_v3/results/axis_2.csv
          for i in 0 1 2 3 4 5; do
            test -f src/outputs/scenario_analysis_v3/results/axis_3_weight_$i.csv
          done

      - name: Merge weight CSVs and generate plots
        env:
          PLANNING_START: ${{ inputs.planning_start }}
          PLANNING_END: ${{ inputs.planning_end }}
          OPERATORS: ${{ inputs.operators }}
          SHIFTS: ${{ inputs.shifts }}
          SHIFT_START: ${{ inputs.shift_start }}
          SHIFT_END: ${{ inputs.shift_end }}
          NON_WORKING_DATES: ${{ inputs.non_working_dates }}
        run: |
          python src/scenario_analysis.py \
            --axis 3 \
            --merge-weights \
            --plots-only \
            --excel-path Inputs_EmpresaX.xlsx \
            --output-dir src/outputs/scenario_analysis_v3 \
            --planning-start "$PLANNING_START" \
            --planning-end "$PLANNING_END" \
            --operators "$OPERATORS" \
            --shifts "$SHIFTS" \
            --shift-start "$SHIFT_START" \
            --shift-end "$SHIFT_END" \
            --non-working-dates "$NON_WORKING_DATES"

      - name: Upload final merged results
        uses: actions/upload-artifact@v4
        with:
          name: scenario-analysis-v3-final
          path: src/outputs/scenario_analysis_v3/
          retention-days: 30
