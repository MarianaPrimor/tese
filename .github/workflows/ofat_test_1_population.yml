name: OFAT Test 1 - Population Size

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  population-runs:
    name: "N=${{ matrix.population }} | seed=${{ matrix.seed }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        population: [50, 100, 150, 200]
        seed: [0, 7, 13, 42, 99]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run population-size experiment
        run: >-
          python src/ofat_experiments.py
          --population-size ${{ matrix.population }}
          --seed ${{ matrix.seed }}
          --output ofat_test_1/population_${{ matrix.population }}_seed_${{ matrix.seed }}.csv

      - name: Upload individual result
        uses: actions/upload-artifact@v4
        with:
          name: ofat-test-1-N${{ matrix.population }}-seed${{ matrix.seed }}
          path: ofat_test_1/population_${{ matrix.population }}_seed_${{ matrix.seed }}.csv
          retention-days: 30

  collect-results:
    name: Create OFAT Test 1 Excel
    runs-on: ubuntu-latest
    needs: population-runs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all individual results
        uses: actions/download-artifact@v4
        with:
          pattern: ofat-test-1-*
          path: ofat_test_1_downloads

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Excel report
        run: >-
          python src/ofat_experiments.py
          --aggregate-population-results ofat_test_1_downloads
          --output-xlsx OFAT_Test_1_Population_Size.xlsx

      - name: Upload final Excel report
        uses: actions/upload-artifact@v4
        with:
          name: OFAT-Test-1-Population-Size-Excel
          path: OFAT_Test_1_Population_Size.xlsx
          retention-days: 30
