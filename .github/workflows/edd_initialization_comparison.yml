name: EDD Initialization Comparison

on:
  workflow_dispatch:
    inputs:
      previous_run_id:
        description: "Optional previous workflow run id containing ratio 0.0 and 1.0 artifacts"
        required: false
        default: ""

jobs:
  run-combination:
    name: "EDD ratio ${{ matrix.heuristic_ratio }} | seed ${{ matrix.seed }}"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        heuristic_ratio: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50]
        seed: [42, 43, 44]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EDD initialization configuration
        run: >
          python src/edd_initialization_comparison.py
          --instance-file Inputs_July.xlsx
          --output-dir edd_initialization_outputs
          --heuristic-ratio ${{ matrix.heuristic_ratio }}
          --seed ${{ matrix.seed }}

      - name: Upload configuration result
        uses: actions/upload-artifact@v4
        with:
          name: edd-init-ratio-${{ matrix.heuristic_ratio }}-seed-${{ matrix.seed }}
          path: edd_initialization_outputs/*.csv

  collect-results:
    name: "Collect EDD initialization outputs"
    needs: run-combination
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: edd_initialization_artifacts

      - name: Download previous ratio 0 and 1 artifacts
        if: ${{ inputs.previous_run_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh run download ${{ inputs.previous_run_id }}
          --name edd-initialization-comparison-results
          --dir edd_initialization_previous

      - name: Reorganize CSVs
        run: |
          mkdir -p edd_initialization_final
          if [ -d edd_initialization_artifacts ]; then
            find edd_initialization_artifacts -name "*.csv" -exec cp {} edd_initialization_final/ \;
          fi
          if [ -d edd_initialization_previous ]; then
            find edd_initialization_previous -name "*.csv" -exec cp {} edd_initialization_final/ \;
          fi

      - name: Generate summary and figures
        run: >
          python src/edd_initialization_comparison.py
          --plots-only
          --output-dir edd_initialization_final

      - name: Upload combined EDD comparison package
        uses: actions/upload-artifact@v4
        with:
          name: edd-initialization-comparison-results
          path: edd_initialization_final/
